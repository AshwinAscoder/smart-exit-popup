services:
  - type: web
    name: smart-exit-popup
    runtime: docker
    repo: https://github.com
    plan: free
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8081
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: write_products,read_orders
      - key: MONGODB_URI
        sync: false
